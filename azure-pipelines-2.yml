trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

# ✅ BUILD STAGE (FAKE / FAST)
- stage: Build
  displayName: "Build Stage"
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Build stage executed successfully"
      displayName: "Build Step"


# ✅ TEST STAGE (FAKE / FAST)
- stage: Test
  displayName: "Test Stage"
  dependsOn: Build
  jobs:
  - job: TestJob
    steps:
    - script: echo "Test stage executed successfully"
      displayName: "Test Step"